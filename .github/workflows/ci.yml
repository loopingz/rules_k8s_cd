name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build all targets
        run: bazel build //...
      - name: Build examples
        run: bazel build //example/...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Go tests
        run: bazel test //go/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Starlark formatting
        run: bazel run @buildifier//:buildifier -- --mode=check -r $PWD

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate docs
        run: bazel build //docs/...
      - name: Check docs are up to date
        run: |
          cp bazel-bin/docs/*.md docs/
          git diff --exit-code docs/ || (echo "Docs are out of date. Run 'bazel build //docs/... && cp bazel-bin/docs/*.md docs/' and commit." && exit 1)
