apiVersion: v1
kind: Pod
metadata:
  name: website
  labels:
    app.kubernetes.io/name: website
    app.kubernetes.io/version: "1.0"
spec:
  containers:
    - name: nginx
      image: nginx:1.27
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        readOnlyRootFilesystem: true
      ports:
        - containerPort: 80
